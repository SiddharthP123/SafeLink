name: safelink_flutter
description: SafeLink safety wristband companion app — Flutter implementation.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0

  # Location
  geolocator: ^13.0.0
  permission_handler: ^11.0.0

  # Storage
  flutter_secure_storage: ^9.0.0

  # Utilities
  url_launcher: ^6.0.0
  http: ^1.0.0

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/   # Uncomment and add image files here when needed

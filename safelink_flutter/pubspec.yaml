name: safelink_flutter
description: SafeLink safety wristband companion app — Flutter implementation.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1

  # BLE — real ESP32 hardware (flutter_blue_plus requires iOS 14+)
  flutter_blue_plus: ^2.3.4

  # Location
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Storage
  flutter_secure_storage: ^10.3.1

  # Contacts
  flutter_contacts: ^2.1.0

  # Auth — social sign-in
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Profile photo
  image_picker: ^1.1.2

  # Ring color picker
  flutter_colorpicker: ^1.1.0

  # Local push notifications (foreground + background alerts)
  flutter_local_notifications: ^18.0.0

  # Maps (embedded OSM tiles — no API key required)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Onboarding + first-launch state
  shared_preferences: ^2.2.3

  # Date formatting
  intl: ^0.19.0

  # Utilities
  url_launcher: ^6.0.0
  http: ^1.0.0

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
